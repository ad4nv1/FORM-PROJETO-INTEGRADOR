<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    
</head>
<body>


    <div class="container">
        <h1>Formulário de requisição</h1>
        
        <form target="_blank" action="https://formsubmit.co/aprocheguecontato@gmail.com" method="POST">
          <div class="form-group">
            <div class="form-row">
                <div class="form-group">

                    

                    <input type="hidden" name="_autoresponse" value="Recebemos sua mensagem, responderemos o mais rápido possível. Nós da família aprochegue agradecemos!!!">
    
                    <label for="tipoRequisicao">Requisição</label> 
                    <select class="form-control" name="tipoRequisicao" id="tipoRequisicao" >
                        <option value="">Selecione uma das opções</option>
                        <option value="Solicitação de conta ADM">Solicitação de conta ADM</option>
                        <option value="Denúncias e reclamações">Denúncias e reclamações</option>
                        <option value="Solicitação de tema">Solicitação de tema</option>
                    </select>
                </div>
              <div class="col">
                <label for="nome">Nome</label> 
                <input type="text" name="name" class="form-control" placeholder="Digite seu nome" required>
              </div>
              <div class="col">
                <label for="email">Email</label> 
                <input type="email" name="email" class="form-control" placeholder="Digite seu email" required>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label for="justificativa">Requisição</label> 
            <textarea placeholder="Digite sua requisição" class="form-control" name="message" rows="10" required></textarea>
          </div>
          <button type="submit" class="btn btn-lg btn-dark btn-block">Submit Form</button>
        </form>
      </div>


    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
    
</body>
</html>
